specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Storage Account
providerId: azure-storage-account
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Storage
  - Blob
  - Rate Limiting
description: Azure Storage standard accounts target high request rates and bandwidth ceilings per account
  per region, with higher defaults in primary regions. Limits cover request rate (requests/sec), ingress
  (Gbps), egress (Gbps), and capacity. When the partition limit is exceeded, the service returns HTTP
  503 (Server Busy) or 500 (Operation Timeout); clients should apply exponential backoff. Higher capacity
  and bandwidth limits can be requested through Azure Support.
sources:
  - https://learn.microsoft.com/en-us/azure/storage/common/scalability-targets-standard-account
headers:
  retryAfter: Retry-After
  requestId: x-ms-request-id
responseCodes:
  serverBusy: 503
  operationTimeout: 500
  throttled: 429
limits:
  - name: Storage accounts per subscription per region
    scope: subscription/region
    metric: accounts
    limit: 250
    notes: Default; raise to 500 by request.
  - name: Storage accounts with Azure DNS zone endpoints (preview)
    scope: subscription/region
    metric: accounts
    limit: 5000
  - name: Default account capacity
    scope: account
    metric: PiB
    limit: 5
  - name: Request rate per account (primary regions)
    scope: account/region
    metric: requests_per_second
    limit: 40000
    timeFrame: second
    notes: Includes US, EU, AP primary regions; raise via support.
  - name: Request rate per account (other regions)
    scope: account/region
    metric: requests_per_second
    limit: 20000
    timeFrame: second
  - name: Ingress per account (primary regions)
    scope: account/region
    metric: Gbps
    limit: 60
    notes: Default; raise via support.
  - name: Ingress per account (other regions)
    scope: account/region
    metric: Gbps
    limit: 25
  - name: Egress per account (primary regions)
    scope: account/region
    metric: Gbps
    limit: 200
  - name: Egress per account (other regions)
    scope: account/region
    metric: Gbps
    limit: 50
  - name: IP rules per account
    scope: account
    metric: rules
    limit: 400
  - name: VNet rules per account
    scope: account
    metric: rules
    limit: 400
  - name: Resource instance rules per account
    scope: account
    metric: rules
    limit: 200
  - name: Private endpoints per account
    scope: account
    metric: endpoints
    limit: 200
policies:
  - name: Backoff on 503/500
    description: Server Busy (503) or Operation Timeout (500) indicate partition saturation. Apply exponential
      backoff with jitter to ease the partition.
  - name: Partition design
    description: Distribute traffic across blob/queue/table partitions; avoid hot prefixes.
  - name: Quota raise via support
    description: Higher capacity, ingress/egress, and request-rate limits can be requested through Azure
      Support.
  - name: Per-service variation
    description: Premium accounts and ADLS Gen2 have different limits; consult per-service scalability
      target pages.
  - name: Smooth bursts
    description: Avoid sudden traffic spikes; ramp up gradually for the partition manager to redistribute
      load.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
