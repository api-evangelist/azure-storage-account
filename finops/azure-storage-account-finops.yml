specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Azure Storage Account
providerId: azure-storage-account
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Storage
  - Blob
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Azure Storage: per-GB-month capacity, per-10K-transaction operations,
  per-GB egress, and tier-based pricing (Hot/Cool/Cold/Archive on Blob; Standard/Premium on Files). Reserved
  Capacity covers Block Blob and Azure Files for committed workloads.'
sources:
  - https://azure.microsoft.com/en-us/pricing/details/storage/
  - https://learn.microsoft.com/en-us/azure/storage/common/scalability-targets-standard-account
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Storage
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Azure Storage
  ServiceCategory: Storage
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  PricingCategory: Pay-As-You-Go
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: blob_capacity
    description: Block / page / append blob storage by access tier
    unit: GB-month
    aggregation: avg
    dimensions:
      - access_tier
      - redundancy
      - region
      - account
  - name: blob_transactions
    description: Read / write / list / scan operations on blob storage
    unit: operation
    aggregation: sum
    dimensions:
      - operation_type
      - access_tier
      - region
  - name: file_capacity
    description: Azure Files capacity
    unit: GB-month
    aggregation: avg
    dimensions:
      - tier
      - redundancy
      - region
  - name: file_transactions
    description: Azure Files SMB/NFS operations
    unit: operation
    aggregation: sum
    dimensions:
      - operation_type
      - region
  - name: queue_table_transactions
    description: Queue and Table operations
    unit: operation
    aggregation: sum
    dimensions:
      - service
      - region
  - name: data_retrieval
    description: Cold / Archive retrieval throughput charges
    unit: GB
    aggregation: sum
    dimensions:
      - tier
  - name: egress_bandwidth
    description: Cross-region / internet egress
    unit: GB
    aggregation: sum
    dimensions:
      - source_region
      - destination
principles:
  - name: Visibility
    description: Use Storage Insights, Storage Analytics metrics, and Azure Cost Management cost-per-account
      breakdowns to view capacity, transaction, and egress costs.
  - name: Allocation
    description: Apply tags to storage accounts; use one account per workload; map costs by tag/container/blob
      prefix using Storage Inventory and cost-allocation rules.
  - name: Optimization
    description: Use lifecycle management to tier blobs Hot -> Cool -> Cold -> Archive automatically;
      enable blob versioning carefully (cost grows with versions); right-size redundancy (LRS vs GRS);
      buy Reserved Capacity for steady-state; use private endpoints to avoid egress.
  - name: Accountability
    description: Set per-account alerts on capacity and transaction growth; assign account owners; review
      lifecycle policies and orphan blobs/snapshots monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
